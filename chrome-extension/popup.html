<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Reply Automator Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header class="header">
        <h1>Settings</h1>
    </header>
    <main class="container">
        <form id="config-form">
            <div class="form-group">
                <label for="backendUrl">Backend URL</label>
                <input type="url" id="backendUrl" name="backendUrl" required>
                <p class="error-message" id="url-error"></p>
            </div>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <div class="password-wrapper">
                    <input type="password" id="apiKey" name="apiKey" required>
                    <button type="button" id="toggleKey" class="toggle-vis" aria-label="Show or hide API key">Show</button>
                </div>
                <p class="error-message" id="key-error"></p>
            </div>
            <div class="form-actions">
                <button type="button" id="testBtn" class="btn btn-secondary">Test Connection</button>
                <button type="submit" id="saveBtn" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="status" class="status" aria-live="polite"></div>
    </main>
    <script src="popup.js" defer></script>
</body>
</html>
