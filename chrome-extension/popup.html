<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Reply Automator Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header class="header">
        <h1>LinkedIn Reply Automator</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="generate">Generate Reply</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </div>
    </header>
    <main class="container">
        <!-- Generate Reply Tab -->
        <div id="generate-tab" class="tab-content active">
            <button type="button" id="generateBtn" class="btn btn-primary btn-large">Generate AI Reply</button>
            <div id="reply-container" style="display: none; margin-top: 15px;">
                <div class="reply-box">
                    <p class="reply-label">Generated Reply:</p>
                    <div id="generatedReply" class="generated-reply-text"></div>
                    <p class="reply-info" style="font-size: 12px; color: #666; margin-top: 10px;">✓ Inserted into LinkedIn message box</p>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content">
            <form id="config-form">
            <div class="form-group">
                <label for="backendUrl">Backend URL</label>
                <input type="url" id="backendUrl" name="backendUrl" required>
                <p class="error-message" id="url-error"></p>
            </div>
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <div class="password-wrapper">
                    <input type="password" id="apiKey" name="apiKey" required>
                    <button type="button" id="toggleKey" class="toggle-vis" aria-label="Show or hide API key">Show</button>
                </div>
                <p class="error-message" id="key-error"></p>
            </div>
            <div class="form-group">
                <label for="clientId">Client</label>
                <select id="clientId" name="clientId" required>
                    <option value="">Loading clients...</option>
                </select>
                <p class="error-message" id="client-error"></p>
            </div>
            <div class="form-actions">
                <button type="button" id="testBtn" class="btn btn-secondary">Test Connection</button>
                <button type="submit" id="saveBtn" class="btn btn-primary">Save</button>
            </div>
        </form>
        <div id="status" class="status" aria-live="polite"></div>
        </div>
    </main>
    <script src="popup.js" defer></script>
</body>
</html>
